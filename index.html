<!DOCTYPE html>
<html>
<head>
  <title>PROOF.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/style-lounge.css?v=3">
</head>

<body>
  <nav class="site-nav" aria-label="PROOF site navigation">
    <a href="/landing">Landing page</a>
    <a href="/business">For restaurants</a>
  </nav>

  <main id="quiz-screen">
    <h1>PROOF.</h1>

    <form id="quiz-form">
      <div id="slider-container"></div>

      <div class="qualitative-section">
        <label for="qualitative-input">
          Optional: Anything you love or hate
        </label>
        <textarea id="qualitative-input" rows="4"></textarea>
      </div>

      <button type="submit">Recommend Drinks</button>
    </form>
  </main>

  <main id="results-screen" hidden>
    <section id="persona-profile" class="persona-profile"></section>
    <div id="ai-notice" class="ai-notice" hidden></div>
    <section class="recommendations-section">
      <div class="recommendations-heading">
        <h2>Your Matches</h2>
        <button id="retake-button" class="secondary-button" type="button">Retake</button>
      </div>
      <div id="results"></div>
    </section>
  </main>

  <script src="/drinks.js"></script>
  <script src="/questions.js"></script>
  <script src="/script.js"></script>
</body>
</html>
